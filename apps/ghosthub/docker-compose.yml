services:
  ghosthub:
    image: 'dhux/ghosthub:latest'
    volumes:
      - '${ROOT_FOLDER_HOST}/media:/media'
      - '${APP_DATA_DIR}/data/instance:/app/instance'
    environment:
      - 'PORT=5000'
      - 'FLASK_CONFIG=production'
      - 'DOCKER_ENV=true'
    x-runtipi:
      internal_port: 5000
      is_main: true
x-runtipi:
  schema_version: 2
