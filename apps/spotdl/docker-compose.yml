services:
  spotdl:
    image: 'spotdl/spotify-downloader:v4.4.3'
    entrypoint:
      - 'uv'
      - 'run'
      - '--project'
      - '/app'
      - 'spotdl'
      - 'web'
      - '--host'
      - '0.0.0.0'
      - '--web-use-output-dir'
      - '--config'
    volumes:
      - '${APP_DATA_DIR}/data/spotdl:/root/.spotdl'
      - '${ROOT_FOLDER_HOST}/media/data/music:/music'
    x-runtipi:
      internal_port: 8800
      is_main: true
x-runtipi:
  schema_version: 2
