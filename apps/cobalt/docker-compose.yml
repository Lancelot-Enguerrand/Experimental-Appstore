services:
  cobalt:
    image: 'ghcr.io/imputnet/cobalt:11.4.3'
    volumes:
      - '${APP_DATA_DIR}/data/config:/config'
    environment:
      - 'API_URL=${APP_PROTOCOL:-http}://${APP_DOMAIN}'
      - 'COOKIE_PATH=/config/cookies.json'
      - 'JWT_SECRET=${COBALT_JWT_SECRET}'
    x-runtipi:
      internal_port: 9000
      is_main: true
x-runtipi:
  schema_version: 2
