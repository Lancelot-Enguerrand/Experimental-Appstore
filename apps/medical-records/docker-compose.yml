services:
  medical-records:
    image: 'ghcr.io/afairgiant/medikeep:v0.64.0'
    volumes:
      - '${APP_DATA_DIR}/data/uploads:/app/uploads'
      - '${APP_DATA_DIR}/data/logs:/app/logs'
      - '${APP_DATA_DIR}/data/backups:/app/backups'
    environment:
      - 'PUID=${MEDRECORDS_PUID-1000}'
      - 'PGID=${MEDRECORDS_PGID-1000}'
      - 'DB_HOST=medical-records-db'
      - 'DB_PORT=5432'
      - 'DB_NAME=medrecords'
      - 'DB_USER=medapp'
      - 'DB_PASSWORD=${MEDRECORDS_DB_PASSWORD}'
      - 'SECRET_KEY=${MEDRECORDS_SECRET_KEY}'
      - 'TZ=${TZ}'
      - 'LOG_LEVEL=INFO'
    x-runtipi:
      internal_port: 8000
      is_main: true
  medical-records-db:
    image: 'postgres:15.8-alpine'
    volumes:
      - '${APP_DATA_DIR}/data/db:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_DB=medrecords'
      - 'POSTGRES_USER=medapp'
      - 'POSTGRES_PASSWORD=${MEDRECORDS_DB_PASSWORD}'
x-runtipi:
  schema_version: 2
