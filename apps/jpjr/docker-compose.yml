services:
  jpjr:
    image: 'ghcr.io/lfpoulain/jpjr:2025-06-25'
    environment:
      - 'SECRET_KEY=${JPJR_SECRET_KEY}'
      - 'OPENAI_API_KEY=${JPJR_OPENAI_API_KEY}'
      - 'USE_SSL=false'
      - 'DB_TYPE=postgresql'
      - 'DB_HOST=jpjr-db'
      - 'DB_NAME=jpjrdb'
      - 'DB_USER=admin'
      - 'DB_PASSWORD=${JPJR_DB_PASSWORD}'
      - 'DB_PORT=5432'
    depends_on:
      - 'jpjr-db'
    x-runtipi:
      internal_port: 5001
      is_main: true
  jpjr-db:
    image: 'postgres:17-alpine'
    volumes:
      - '${APP_DATA_DIR}/data/db:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_PASSWORD=${JPJR_DB_PASSWORD}'
      - 'POSTGRES_USER=admin'
      - 'POSTGRES_DB=jpjrdb'
    healthcheck:
      test: 'pg_isready -h localhost -U admin -d jpjrdb'
      interval: '30s'
      timeout: '5s'
      retries: 10
x-runtipi:
  schema_version: 2
