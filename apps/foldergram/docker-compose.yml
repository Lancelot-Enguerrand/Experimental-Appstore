services:
  foldergram:
    image: ghcr.io/foldergram/foldergram:1.0.8
    x-runtipi:
      is_main: true
      internal_port: 4141
    environment:
      NODE_ENV: production
      DATA_ROOT: /app/data
      GALLERY_ROOT: /app/data/gallery
      DB_DIR: /app/data/db
      THUMBNAILS_DIR: /app/data/thumbnails
      PREVIEWS_DIR: /app/data/previews
    volumes:
      - ${FOLDERGRAM_GALLERY_ROOT_PATH}:/app/data/gallery:${FOLDERGRAM_GALLERY_ACCESS}
      - ${APP_DATA_DIR}/data/db:/app/data/db
      - ${APP_DATA_DIR}/data/thumbnails:/app/data/thumbnails
      - ${APP_DATA_DIR}/data/previews:/app/data/previews
 
x-runtipi:
  schema_version: 2
